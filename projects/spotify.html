<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Clone | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#121212;color:#fff;overflow:hidden;height:100vh}
.back-link{position:fixed;top:10px;right:20px;z-index:200;color:#1DB954;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;transition:.3s}.back-link:hover{opacity:.7}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:1fr 90px;height:100vh}
/* Sidebar */
.sidebar{background:#000;padding:8px;overflow-y:auto;grid-row:1/2}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.sidebar-section{background:#121212;border-radius:8px;padding:16px;margin-bottom:8px}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.logo i{color:#1DB954;font-size:28px}
.logo span{font-size:22px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:16px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#b3b3b3;transition:.2s;text-decoration:none}
.nav-item:hover,.nav-item.active{color:#fff}
.nav-item i{width:24px;text-align:center;font-size:20px}
.library-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.library-header h3{font-size:15px;display:flex;align-items:center;gap:10px;color:#b3b3b3}
.library-header button{background:none;border:none;color:#b3b3b3;font-size:18px;cursor:pointer}
.playlist-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:6px;cursor:pointer;transition:.2s}
.playlist-item:hover{background:rgba(255,255,255,.1)}
.playlist-img{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0}
.playlist-name{font-size:14px;font-weight:500}
.playlist-type{font-size:12px;color:#b3b3b3}
/* Main Content */
.main-content{overflow-y:auto;padding:24px 32px;background:linear-gradient(180deg,#1a3a2a 0%,#121212 300px)}
.main-content::-webkit-scrollbar{width:6px}.main-content::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.greeting{font-size:28px;font-weight:700;margin-bottom:20px}
.card-row{margin-bottom:32px}
.card-row h2{font-size:22px;font-weight:700;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.card{background:rgba(255,255,255,.05);border-radius:8px;padding:16px;cursor:pointer;transition:.3s;position:relative}
.card:hover{background:rgba(255,255,255,.1)}
.card:hover .play-btn{opacity:1;transform:translateY(-8px)}
.card-img{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:#b3b3b3;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.play-btn{position:absolute;right:16px;bottom:80px;width:48px;height:48px;border-radius:50%;background:#1DB954;border:none;color:#000;font-size:20px;cursor:pointer;opacity:0;transform:translateY(0);transition:.3s;box-shadow:0 8px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
/* Quick picks */
.quick-picks{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:32px}
.quick-card{display:flex;align-items:center;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;cursor:pointer;transition:.2s;height:56px}
.quick-card:hover{background:rgba(255,255,255,.15)}
.quick-card img{width:56px;height:56px;object-fit:cover}
.quick-card span{padding:0 16px;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Player */
.player{grid-column:1/-1;background:#181818;border-top:1px solid #282828;display:grid;grid-template-columns:280px 1fr 280px;align-items:center;padding:0 16px}
.player-left{display:flex;align-items:center;gap:14px}
.now-playing-img{width:56px;height:56px;border-radius:4px;object-fit:cover}
.now-playing-info .song-name{font-size:13px;font-weight:500}
.now-playing-info .artist-name{font-size:11px;color:#b3b3b3}
.player-left .like-btn{background:none;border:none;color:#b3b3b3;font-size:16px;cursor:pointer;margin-left:8px;transition:.2s}
.player-left .like-btn:hover,.player-left .like-btn.liked{color:#1DB954}
.player-center{display:flex;flex-direction:column;align-items:center;gap:8px}
.player-controls{display:flex;align-items:center;gap:16px}
.player-controls button{background:none;border:none;color:#b3b3b3;font-size:16px;cursor:pointer;transition:.2s}
.player-controls button:hover{color:#fff}
.play-pause{width:36px;height:36px;border-radius:50%;background:#fff;color:#000;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:.1s}
.play-pause:hover{transform:scale(1.05)}
.progress-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:600px}
.progress-bar .time{font-size:11px;color:#b3b3b3;min-width:35px;text-align:center}
.progress-track{flex:1;height:4px;background:#4d4d4d;border-radius:4px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:#1DB954;border-radius:4px;width:35%;transition:width .1s}
.progress-track:hover .progress-fill{background:#1DB954}
.player-right{display:flex;align-items:center;justify-content:flex-end;gap:12px}
.player-right button{background:none;border:none;color:#b3b3b3;font-size:14px;cursor:pointer;transition:.2s}
.player-right button:hover{color:#fff}
.vol-bar{width:80px;height:4px;background:#4d4d4d;border-radius:4px;position:relative;cursor:pointer}
.vol-fill{height:100%;width:70%;background:#fff;border-radius:4px}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}.player{grid-template-columns:1fr;text-align:center}.player-left,.player-right{display:none}}
</style>
</head>
<body>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="logo"><i class="fa-brands fa-spotify"></i><span>Spotify</span></div>
      <a class="nav-item active"><i class="fa-solid fa-house"></i> Home</a>
      <a class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
    </div>
    <div class="sidebar-section">
      <div class="library-header"><h3><i class="fa-solid fa-lines-staggered"></i> Your Library</h3><button><i class="fa-solid fa-plus"></i></button></div>
      <div id="playlists"></div>
    </div>
  </aside>
  <main class="main-content">
    <h1 class="greeting" id="greeting">Good Evening</h1>
    <div class="quick-picks" id="quickPicks"></div>
    <div class="card-row"><h2>Made for You</h2><div class="cards" id="madeForYou"></div></div>
    <div class="card-row"><h2>Recently Played</h2><div class="cards" id="recentlyPlayed"></div></div>
    <div class="card-row"><h2>Popular Artists</h2><div class="cards" id="popularArtists"></div></div>
  </main>
  <footer class="player">
    <div class="player-left">
      <img class="now-playing-img" src="https://picsum.photos/seed/song1/56/56" alt="Now Playing" id="nowPlayingImg">
      <div class="now-playing-info"><div class="song-name" id="songName">Blinding Lights</div><div class="artist-name" id="artistName">The Weeknd</div></div>
      <button class="like-btn" onclick="this.classList.toggle('liked')"><i class="fa-regular fa-heart"></i></button>
    </div>
    <div class="player-center">
      <div class="player-controls">
        <button><i class="fa-solid fa-shuffle"></i></button>
        <button><i class="fa-solid fa-backward-step"></i></button>
        <button class="play-pause" id="playPause" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
        <button><i class="fa-solid fa-forward-step"></i></button>
        <button><i class="fa-solid fa-repeat"></i></button>
      </div>
      <div class="progress-bar"><span class="time">1:23</span><div class="progress-track" onclick="seekProgress(event)"><div class="progress-fill" id="progressFill"></div></div><span class="time">3:20</span></div>
    </div>
    <div class="player-right">
      <button><i class="fa-solid fa-microphone"></i></button>
      <button><i class="fa-solid fa-list"></i></button>
      <button><i class="fa-solid fa-volume-high"></i></button>
      <div class="vol-bar"><div class="vol-fill"></div></div>
    </div>
  </footer>
</div>
<script>
const h=new Date().getHours();document.getElementById("greeting").textContent=h<12?"Good Morning":h<18?"Good Afternoon":"Good Evening";
const playlists=[{name:"Liked Songs",type:"Playlist · 234 songs",img:"https://picsum.photos/seed/pl1/48/48"},{name:"Chill Vibes",type:"Playlist · 45 songs",img:"https://picsum.photos/seed/pl2/48/48"},{name:"Workout Mix",type:"Playlist · 78 songs",img:"https://picsum.photos/seed/pl3/48/48"},{name:"Bollywood Hits",type:"Playlist · 120 songs",img:"https://picsum.photos/seed/pl4/48/48"},{name:"Coding Flow",type:"Playlist · 56 songs",img:"https://picsum.photos/seed/pl5/48/48"},{name:"Lo-fi Study",type:"Playlist · 89 songs",img:"https://picsum.photos/seed/pl6/48/48"}];
document.getElementById("playlists").innerHTML=playlists.map(p=>`<div class="playlist-item"><img class="playlist-img" src="${p.img}" alt="${p.name}"><div><div class="playlist-name">${p.name}</div><div class="playlist-type">${p.type}</div></div></div>`).join("");
const quicks=["Liked Songs","Chill Vibes","Bollywood Hits","Coding Flow","Lo-fi Study","Workout Mix"];
document.getElementById("quickPicks").innerHTML=quicks.map((q,i)=>`<div class="quick-card"><img src="https://picsum.photos/seed/qp${i}/56/56" alt="${q}"><span>${q}</span></div>`).join("");
const madeFor=[{title:"Daily Mix 1",desc:"Arijit Singh, Pritam, A.R. Rahman",img:"https://picsum.photos/seed/m1/200/200"},{title:"Discover Weekly",desc:"Your weekly mixtape of fresh music",img:"https://picsum.photos/seed/m2/200/200"},{title:"Release Radar",desc:"Catch all the latest from artists you follow",img:"https://picsum.photos/seed/m3/200/200"},{title:"Chill Mix",desc:"The Weeknd, Dua Lipa, Post Malone",img:"https://picsum.photos/seed/m4/200/200"},{title:"Mood Booster",desc:"Get happy with these feel-good hits!",img:"https://picsum.photos/seed/m5/200/200"}];
document.getElementById("madeForYou").innerHTML=madeFor.map(c=>`<div class="card"><img class="card-img" src="${c.img}" alt="${c.title}"><button class="play-btn"><i class="fa-solid fa-play"></i></button><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div></div>`).join("");
const recent=[{title:"Blinding Lights",desc:"The Weeknd",img:"https://picsum.photos/seed/r1/200/200"},{title:"Levitating",desc:"Dua Lipa",img:"https://picsum.photos/seed/r2/200/200"},{title:"Shape of You",desc:"Ed Sheeran",img:"https://picsum.photos/seed/r3/200/200"},{title:"Stay",desc:"Justin Bieber, Kid LAROI",img:"https://picsum.photos/seed/r4/200/200"},{title:"Heat Waves",desc:"Glass Animals",img:"https://picsum.photos/seed/r5/200/200"}];
document.getElementById("recentlyPlayed").innerHTML=recent.map(c=>`<div class="card"><img class="card-img" src="${c.img}" alt="${c.title}"><button class="play-btn"><i class="fa-solid fa-play"></i></button><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div></div>`).join("");
const artists=[{title:"Arijit Singh",desc:"Artist",img:"https://picsum.photos/seed/a1/200/200"},{title:"The Weeknd",desc:"Artist",img:"https://picsum.photos/seed/a2/200/200"},{title:"Dua Lipa",desc:"Artist",img:"https://picsum.photos/seed/a3/200/200"},{title:"A.R. Rahman",desc:"Artist",img:"https://picsum.photos/seed/a4/200/200"},{title:"Ed Sheeran",desc:"Artist",img:"https://picsum.photos/seed/a5/200/200"}];
document.getElementById("popularArtists").innerHTML=artists.map(c=>`<div class="card"><img class="card-img" src="${c.img}" alt="${c.title}" style="border-radius:50%"><button class="play-btn"><i class="fa-solid fa-play"></i></button><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div></div>`).join("");
let playing=false;
function togglePlay(){playing=!playing;document.getElementById("playPause").innerHTML=playing?'<i class="fa-solid fa-pause"></i>':'<i class="fa-solid fa-play"></i>';if(playing){animateProgress()}}
let progress=35;function animateProgress(){if(!playing)return;progress+=0.5;if(progress>100)progress=0;document.getElementById("progressFill").style.width=progress+"%";requestAnimationFrame(()=>setTimeout(animateProgress,200))}
function seekProgress(e){const rect=e.currentTarget.getBoundingClientRect();progress=(e.clientX-rect.left)/rect.width*100;document.getElementById("progressFill").style.width=progress+"%"}
</script>
</body>
</html>
