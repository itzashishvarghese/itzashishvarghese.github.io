<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
body{background:#0f0f0f;color:#f1f1f1}
a{text-decoration:none;color:inherit}
.back-link{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 20px;background:rgba(255,0,0,.85);color:#fff;border-radius:30px;font-size:12px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:.3s}.back-link:hover{transform:scale(1.05)}
/* Header */
header{position:fixed;top:0;width:100%;height:56px;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid #272727}
.h-left{display:flex;align-items:center;gap:16px}
.h-left button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%}.h-left button:hover{background:#272727}
.yt-logo{display:flex;align-items:center;gap:4px;cursor:pointer}
.yt-logo i{color:#ff0000;font-size:30px}
.yt-logo span{font-size:21px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.yt-logo sup{font-size:10px;color:#aaa;font-weight:400;margin-left:1px}
.h-center{display:flex;align-items:center;width:45%;max-width:600px}
.search-form{display:flex;flex:1}
.search-form input{flex:1;padding:8px 16px;background:#121212;border:1px solid #303030;border-radius:20px 0 0 20px;color:#fff;font-size:15px;outline:none;font-family:'Roboto',sans-serif}
.search-form input:focus{border-color:#1c62b9;background:#1a1a2e}
.search-btn{padding:0 20px;background:#272727;border:1px solid #303030;border-left:none;border-radius:0 20px 20px 0;color:#fff;cursor:pointer;font-size:16px;height:40px;transition:.2s}.search-btn:hover{background:#3a3a3a}
.mic-btn{width:40px;height:40px;border-radius:50%;background:#272727;border:none;color:#fff;margin-left:8px;cursor:pointer;font-size:16px}.mic-btn:hover{background:#333}
.h-right{display:flex;align-items:center;gap:4px}
.h-right button{width:40px;height:40px;border-radius:50%;background:none;border:none;color:#fff;cursor:pointer;font-size:18px}.h-right button:hover{background:#272727}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:#7b2ff7;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff}
/* Sidebar */
.sidebar{position:fixed;top:56px;left:0;width:240px;height:calc(100vh - 56px);background:#0f0f0f;overflow-y:auto;padding:12px 0;z-index:50}
.sidebar::-webkit-scrollbar{width:8px}.sidebar::-webkit-scrollbar-thumb{background:#272727;border-radius:4px}
.sb-item{display:flex;align-items:center;gap:24px;padding:10px 24px;cursor:pointer;font-size:14px;color:#f1f1f1;border-radius:10px;margin:0 8px;transition:.15s}
.sb-item:hover{background:#272727}
.sb-item.active{background:rgba(255,255,255,.12);font-weight:500}
.sb-item i,.sb-item img{width:24px;text-align:center;font-size:20px}
.sb-item img{height:24px;border-radius:50%;object-fit:cover}
.sb-divider{height:1px;background:#272727;margin:12px 16px}
.sb-title{font-size:14px;padding:6px 24px;font-weight:500;color:#f1f1f1;margin-top:4px}
/* Content */
.content{margin-left:240px;margin-top:56px;padding:16px 24px}
/* Chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;position:sticky;top:56px;background:#0f0f0f;z-index:10;padding-top:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;background:#272727;border:none;border-radius:8px;color:#f1f1f1;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;font-family:'Roboto',sans-serif;font-weight:500}
.chip.active{background:#f1f1f1;color:#0f0f0f}
.chip:hover:not(.active){background:#3a3a3a}
/* Video Grid */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.video-card{cursor:pointer;border-radius:12px;transition:.2s}
.thumb-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#1a1a1a}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:.3s}
.video-card:hover .thumb-wrap img{border-radius:0;opacity:.85}
.duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.9);color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.vid-info{display:flex;gap:12px;padding:12px 0}
.ch-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;background:#333}
.vid-title{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.ch-name{font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px}
.vid-meta{font-size:12px;color:#aaa}
/* Loading */
.loading-grid{display:flex;justify-content:center;align-items:center;padding:60px;color:#aaa;flex-direction:column;gap:16px;grid-column:1/-1}
.spinner{width:48px;height:48px;border:3px solid rgba(255,0,0,.2);border-top-color:#ff0000;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* No results */
.no-results{grid-column:1/-1;text-align:center;padding:60px;color:#aaa}
.no-results i{font-size:48px;margin-bottom:16px;display:block;color:#333}
/* Search results notice */
.search-notice{display:flex;align-items:center;gap:10px;color:#aaa;font-size:13px;padding:8px 0 16px;border-bottom:1px solid #272727;margin-bottom:16px}
.search-notice b{color:#f1f1f1}
.search-notice .clear-btn{margin-left:auto;background:none;border:1px solid #555;color:#aaa;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:.2s}.clear-btn:hover{border-color:#f1f1f1;color:#f1f1f1}
/* Player Modal */
.player-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column}
.player-modal.open{display:flex}
.player-close{position:absolute;top:16px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10;transition:.3s}.player-close:hover{color:#ff0000}
.player-frame{width:90%;max-width:900px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.player-frame iframe{width:100%;height:100%;border:none}
.player-title{color:#fff;font-size:18px;font-weight:500;margin-top:16px;max-width:900px;width:90%;text-align:left}
.player-meta{color:#aaa;font-size:13px;margin-top:6px;max-width:900px;width:90%;text-align:left}
/* API Notice */
.api-key-notice{background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.25);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#fbbf24;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.api-key-notice i{margin-top:2px;flex-shrink:0}

@media(max-width:1200px){.sidebar{display:none}.content{margin-left:0}}
@media(max-width:600px){.video-grid{grid-template-columns:1fr}.h-center{display:none}.content{padding:16px 12px}}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <button><i class="fa-solid fa-bars"></i></button>
    <div class="yt-logo"><i class="fa-brands fa-youtube"></i><span>YouTube</span><sup>IN</sup></div>
  </div>
  <div class="h-center">
    <form class="search-form" onsubmit="doSearch();return false;">
      <input type="text" id="searchInput" placeholder="Search any video...">
      <button class="search-btn" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>
    <button class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
  </div>
  <div class="h-right">
    <button><i class="fa-solid fa-video-camera"></i></button>
    <button><i class="fa-solid fa-bell"></i></button>
    <div class="avatar-btn">A</div>
  </div>
</header>

<nav class="sidebar">
  <div class="sb-item active"><i class="fa-solid fa-house"></i>Home</div>
  <div class="sb-item"><i class="fa-brands fa-youtube"></i>Shorts</div>
  <div class="sb-item"><i class="fa-solid fa-list"></i>Subscriptions</div>
  <div class="sb-divider"></div>
  <div class="sb-title">You ›</div>
  <div class="sb-item"><i class="fa-solid fa-clock-rotate-left"></i>History</div>
  <div class="sb-item"><i class="fa-solid fa-list-ul"></i>Playlists</div>
  <div class="sb-item"><i class="fa-solid fa-clock"></i>Watch Later</div>
  <div class="sb-item"><i class="fa-solid fa-thumbs-up"></i>Liked Videos</div>
  <div class="sb-divider"></div>
  <div class="sb-title">Explore</div>
  <div class="sb-item" onclick="loadChip('Trending')"><i class="fa-solid fa-fire"></i>Trending</div>
  <div class="sb-item" onclick="loadChip('Music')"><i class="fa-solid fa-music"></i>Music</div>
  <div class="sb-item" onclick="loadChip('Gaming')"><i class="fa-solid fa-gamepad"></i>Gaming</div>
  <div class="sb-item" onclick="loadChip('News')"><i class="fa-solid fa-newspaper"></i>News</div>
  <div class="sb-item" onclick="loadChip('Sports')"><i class="fa-solid fa-trophy"></i>Sports</div>
</nav>

<main class="content">
  <div class="chips" id="chips"></div>
  <div id="searchNotice"></div>
  <div class="video-grid" id="videoGrid"></div>
</main>

<div class="player-modal" id="playerModal">
  <button class="player-close" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
  <div class="player-frame"><iframe id="playerIframe" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>
  <div class="player-title" id="playerTitle"></div>
  <div class="player-meta" id="playerMeta"></div>
</div>

<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Portfolio</a>

<script>
// ============================================================
// YouTube Data API v3 — Free quota: 10,000 units/day
// Using a demo key for portfolio purposes
// ============================================================
const YT_API_KEY = 'AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY';

const cats = ["All","JavaScript","CSS","React","Python","Web Dev","Gaming","Music","News","Sports","Coding","Trending","Lo-fi","Comedy","Science"];
let activeChip = "All";
let currentQuery = "";

// Build chips
document.getElementById("chips").innerHTML = cats.map((c,i) =>
  `<button class="chip${i===0?" active":""}" onclick="loadChip('${c}')">${c}</button>`
).join("");

function loadChip(cat){
  activeChip = cat;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.textContent===cat));
  currentQuery = cat === "All" ? "trending India 2024" : cat;
  document.getElementById("searchNotice").innerHTML = "";
  document.getElementById("searchInput").value = "";
  fetchVideos(currentQuery);
}

function doSearch(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return;
  currentQuery = q;
  activeChip = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.getElementById("searchNotice").innerHTML = `
    <div class="search-notice">
      <i class="fa-solid fa-magnifying-glass"></i>
      Results for <b>"${q}"</b>
      <button class="clear-btn" onclick="loadChip('All')">✕ Clear</button>
    </div>`;
  fetchVideos(q);
}

async function fetchVideos(query){
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = `<div class="loading-grid"><div class="spinner"></div><p>Searching for "<b>${query}</b>"...</p></div>`;
  try {
    const maxResults = 12;
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&maxResults=${maxResults}&type=video&key=${YT_API_KEY}&regionCode=IN&relevanceLanguage=en`;
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){
      // API quota exceeded — fallback to curated real videos
      renderFallback(query);
      return;
    }
    if(!data.items || data.items.length===0){
      grid.innerHTML = `<div class="no-results"><i class="fa-solid fa-magnifying-glass"></i><p>No videos found for "<b>${query}</b>"</p></div>`;
      return;
    }
    // Fetch video details (duration, view count)
    const ids = data.items.map(i=>i.id.videoId).join(",");
    const detailUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}&key=${YT_API_KEY}`;
    const detailRes = await fetch(detailUrl);
    const detailData = await detailRes.json();
    const detailMap = {};
    if(detailData.items) detailData.items.forEach(d => detailMap[d.id] = d);
    renderVideos(data.items, detailMap);
  } catch(e){
    renderFallback(query);
  }
}

function parseDuration(iso){
  if(!iso) return "";
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return "";
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if(h>0) return `${h}:${String(min).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${min}:${String(s).padStart(2,"0")}`;
}

function formatViews(n){
  n = parseInt(n||0);
  if(n>=1e9) return (n/1e9).toFixed(1)+"B views";
  if(n>=1e6) return (n/1e6).toFixed(1)+"M views";
  if(n>=1e3) return (n/1e3).toFixed(0)+"K views";
  return n+" views";
}

function timeAgo(dateStr){
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if(diff<60) return "just now";
  if(diff<3600) return Math.floor(diff/60)+" minutes ago";
  if(diff<86400) return Math.floor(diff/3600)+" hours ago";
  if(diff<2592000) return Math.floor(diff/86400)+" days ago";
  if(diff<31536000) return Math.floor(diff/2592000)+" months ago";
  return Math.floor(diff/31536000)+" years ago";
}

function renderVideos(items, detailMap){
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = items.map(item => {
    const vid = item.id.videoId;
    const sn = item.snippet;
    const detail = detailMap[vid];
    const dur = detail ? parseDuration(detail.contentDetails.duration) : "";
    const views = detail ? formatViews(detail.statistics.viewCount) : "";
    const ago = timeAgo(sn.publishedAt);
    const thumb = sn.thumbnails.high?.url || sn.thumbnails.medium?.url || sn.thumbnails.default?.url;
    const chThumb = `https://i.pravatar.cc/36?u=${encodeURIComponent(sn.channelTitle)}`;
    return `<div class="video-card" onclick="openPlayer('${vid}','${sn.title.replace(/'/g,"\\'")}','${sn.channelTitle.replace(/'/g,"\\'")}','${views}','${ago}')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${sn.title}" loading="lazy">
        ${dur?`<span class="duration">${dur}</span>`:""}
      </div>
      <div class="vid-info">
        <img class="ch-avatar" src="${chThumb}" alt="${sn.channelTitle}">
        <div>
          <div class="vid-title">${sn.title}</div>
          <div class="ch-name">${sn.channelTitle} <i class="fa-solid fa-check-circle" style="font-size:12px;color:#aaa"></i></div>
          <div class="vid-meta">${views}${views&&ago?' · ':''}${ago}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// Fallback with real hardcoded YouTube videos if API quota exceeded
function renderFallback(query){
  const fallback = [
    {vid:"hdI2bqOjy3c",title:"JavaScript Crash Course For Beginners",ch:"Traversy Media",views:"3.4M views",ago:"2 years ago",dur:"1:40:29",thumb:"https://i.ytimg.com/vi/hdI2bqOjy3c/hq720.jpg"},
    {vid:"Tn6-PIqc4UM",title:"React in 100 Seconds",ch:"Fireship",views:"4.2M views",ago:"3 years ago",dur:"2:27",thumb:"https://i.ytimg.com/vi/Tn6-PIqc4UM/hq720.jpg"},
    {vid:"K74l26pE4YA",title:"CSS Flexbox in 100 Seconds",ch:"Fireship",views:"1.8M views",ago:"2 years ago",dur:"2:18",thumb:"https://i.ytimg.com/vi/K74l26pE4YA/hq720.jpg"},
    {vid:"MIYQR-Ybrn4",title:"Build A Weather App With HTML CSS & JavaScript",ch:"developedbyed",views:"892K views",ago:"2 years ago",dur:"47:33",thumb:"https://i.ytimg.com/vi/MIYQR-Ybrn4/hq720.jpg"},
    {vid:"_uQrJ0TkZlc",title:"Python for Beginners – Full Course",ch:"Programming with Mosh",views:"28M views",ago:"4 years ago",dur:"6:14:07",thumb:"https://i.ytimg.com/vi/_uQrJ0TkZlc/hq720.jpg"},
    {vid:"f2EqECiTBL8",title:"Node.js Full Course for Beginners",ch:"Dave Gray",views:"1.9M views",ago:"2 years ago",dur:"7:00:00",thumb:"https://i.ytimg.com/vi/f2EqECiTBL8/hq720.jpg"},
    {vid:"2pZmKW9-I_k",title:"TypeScript Tutorial for Beginners",ch:"The Net Ninja",views:"900K views",ago:"1 year ago",dur:"54:21",thumb:"https://i.ytimg.com/vi/2pZmKW9-I_k/hq720.jpg"},
    {vid:"oYRda7UtuhA",title:"Build a Complete Responsive Website",ch:"GreatStack",views:"2.1M views",ago:"1 year ago",dur:"1:54:32",thumb:"https://i.ytimg.com/vi/oYRda7UtuhA/hq720.jpg"},
    {vid:"-56x56UppqQ",title:"MongoDB Crash Course",ch:"Traversy Media",views:"1.5M views",ago:"3 years ago",dur:"36:43",thumb:"https://i.ytimg.com/vi/-56x56UppqQ/hq720.jpg"},
    {vid:"tRZGeaHPoaw",title:"Git & GitHub Tutorial for Beginners",ch:"Kevin Powell",views:"1.1M views",ago:"1 year ago",dur:"45:00",thumb:"https://i.ytimg.com/vi/tRZGeaHPoaw/hq720.jpg"},
    {vid:"DenUCuq4G04",title:"Tailwind CSS Full Course 2024",ch:"Net Ninja",views:"567K views",ago:"8 months ago",dur:"2:15:30",thumb:"https://i.ytimg.com/vi/DenUCuq4G04/hq720.jpg"},
    {vid:"Jk5JhDjAQ_k",title:"Build 5 Projects With HTML, CSS & JavaScript",ch:"Traversy Media",views:"678K views",ago:"6 months ago",dur:"1:28:45",thumb:"https://i.ytimg.com/vi/Jk5JhDjAQ_k/hq720.jpg"},
  ];
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = fallback.map(v =>
    `<div class="video-card" onclick="openPlayer('${v.vid}','${v.title.replace(/'/g,"\\'")}','${v.ch}','${v.views}','${v.ago}')">
      <div class="thumb-wrap">
        <img src="${v.thumb}" alt="${v.title}" loading="lazy">
        <span class="duration">${v.dur}</span>
      </div>
      <div class="vid-info">
        <img class="ch-avatar" src="https://i.pravatar.cc/36?u=${encodeURIComponent(v.ch)}" alt="${v.ch}">
        <div>
          <div class="vid-title">${v.title}</div>
          <div class="ch-name">${v.ch} <i class="fa-solid fa-check-circle" style="font-size:12px;color:#aaa"></i></div>
          <div class="vid-meta">${v.views} · ${v.ago}</div>
        </div>
      </div>
    </div>`
  ).join("");
}

function openPlayer(vid, title, channel, views, ago){
  document.getElementById("playerIframe").src = `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0`;
  document.getElementById("playerTitle").textContent = title;
  document.getElementById("playerMeta").textContent = `${channel} · ${views} · ${ago}`;
  document.getElementById("playerModal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closePlayer(){
  document.getElementById("playerIframe").src = "";
  document.getElementById("playerModal").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("playerModal").addEventListener("click", e => { if(e.target.id==="playerModal") closePlayer(); });
document.addEventListener("keydown", e => { if(e.key==="Escape") closePlayer(); });

// Load on start
loadChip("All");
</script>
</body>
</html>
