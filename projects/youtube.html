<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
body{background:#0f0f0f;color:#f1f1f1}
.back-link{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;color:#3ea6ff;font-size:13px;text-decoration:none;transition:.3s;position:fixed;top:56px;left:10px;z-index:50}.back-link:hover{opacity:.7}
/* Header */
.header{position:fixed;top:0;width:100%;height:56px;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid rgba(255,255,255,.1)}
.header-left{display:flex;align-items:center;gap:16px}
.menu-icon{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px}
.logo{display:flex;align-items:center;gap:2px;text-decoration:none}
.logo-icon{color:#ff0000;font-size:28px}
.logo-text{color:#fff;font-size:20px;font-weight:700;letter-spacing:-1px}
.logo-text sup{font-size:10px;opacity:.5;font-weight:400;vertical-align:super}
.search-bar{display:flex;width:520px;max-width:40vw}
.search-bar input{flex:1;padding:8px 16px;background:#121212;border:1px solid #303030;border-radius:20px 0 0 20px;color:#fff;font-size:14px;outline:none}
.search-bar input:focus{border-color:#1c62b9}
.search-bar button{padding:0 20px;background:#222;border:1px solid #303030;border-left:none;border-radius:0 20px 20px 0;color:#fff;cursor:pointer;font-size:16px}
.header-right{display:flex;align-items:center;gap:8px}
.header-right button{background:none;border:none;color:#fff;font-size:18px;padding:8px;cursor:pointer;border-radius:50%}
.header-right button:hover{background:rgba(255,255,255,.1)}
.avatar{width:32px;height:32px;border-radius:50%;background:#7b2ff7;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;cursor:pointer}
/* Layout */
.layout{display:flex;margin-top:56px}
/* Sidebar */
.sidebar{width:240px;min-height:calc(100vh - 56px);background:#0f0f0f;padding:12px 0;position:fixed;overflow-y:auto;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-item{display:flex;align-items:center;gap:24px;padding:10px 24px;cursor:pointer;transition:.2s;font-size:14px;color:#f1f1f1;text-decoration:none}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,.1);border-radius:10px;margin:0 8px;padding:10px 16px}
.sidebar-item.active{background:rgba(255,255,255,.15);font-weight:500}
.sidebar-item i{width:24px;text-align:center;font-size:18px}
.sidebar-divider{height:1px;background:rgba(255,255,255,.1);margin:12px 16px}
.sidebar-title{font-size:13px;padding:8px 24px;opacity:.5;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
/* Main Content */
.main{margin-left:240px;padding:24px 24px 24px 32px;flex:1}
/* Category Chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:20px;position:sticky;top:56px;background:#0f0f0f;z-index:10;padding-top:8px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 16px;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#f1f1f1;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;font-family:'Roboto',sans-serif;font-weight:500}
.chip.active,.chip:hover{background:#f1f1f1;color:#0f0f0f}
/* Video Grid */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.video-card{cursor:pointer;transition:.2s}
.video-card:hover{transform:scale(1.02)}
.thumbnail-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#1a1a1a}
.thumbnail{width:100%;height:100%;object-fit:cover}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.video-info{display:flex;gap:12px;padding:12px 4px}
.channel-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover}
.video-details{flex:1}
.video-title{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.channel-name{font-size:12px;color:#aaa;transition:.2s}
.channel-name:hover{color:#fff}
.video-meta{font-size:12px;color:#aaa}
@media(max-width:1200px){.sidebar{display:none}.main{margin-left:0}}
@media(max-width:600px){.video-grid{grid-template-columns:1fr}.search-bar{display:none}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left"><button class="menu-icon"><i class="fa-solid fa-bars"></i></button><a href="#" class="logo"><i class="fa-brands fa-youtube logo-icon"></i><span class="logo-text">YouTube<sup>IN</sup></span></a></div>
  <div class="search-bar"><input type="text" id="searchInput" placeholder="Search"><button><i class="fa-solid fa-magnifying-glass"></i></button></div>
  <div class="header-right"><button><i class="fa-solid fa-video"></i></button><button><i class="fa-solid fa-bell"></i></button><div class="avatar">A</div></div>
</header>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
<div class="layout">
  <nav class="sidebar">
    <a class="sidebar-item active"><i class="fa-solid fa-house"></i> Home</a>
    <a class="sidebar-item"><i class="fa-solid fa-compass"></i> Explore</a>
    <a class="sidebar-item"><i class="fa-brands fa-youtube"></i> Shorts</a>
    <a class="sidebar-item"><i class="fa-solid fa-list"></i> Subscriptions</a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
    <a class="sidebar-item"><i class="fa-solid fa-thumbs-up"></i> Liked Videos</a>
    <a class="sidebar-item"><i class="fa-solid fa-download"></i> Downloads</a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-title">Subscriptions</div>
    <a class="sidebar-item"><img src="https://i.pravatar.cc/24?img=11" style="width:24px;height:24px;border-radius:50%"> Traversy Media</a>
    <a class="sidebar-item"><img src="https://i.pravatar.cc/24?img=12" style="width:24px;height:24px;border-radius:50%"> Fireship</a>
    <a class="sidebar-item"><img src="https://i.pravatar.cc/24?img=13" style="width:24px;height:24px;border-radius:50%"> Web Dev Simplified</a>
  </nav>
  <main class="main">
    <div class="chips" id="chips"></div>
    <div class="video-grid" id="videoGrid"></div>
  </main>
</div>
<script>
const cats=["All","Music","Gaming","Live","JavaScript","CSS","React","Web Development","Coding","Comedy","News","Sports","Podcasts"];
document.getElementById("chips").innerHTML=cats.map((c,i)=>`<button class="chip${i===0?" active":""}" onclick="filterChip(this)">${c}</button>`).join("");
function filterChip(el){document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));el.classList.add("active")}
const videos=[
  {title:"Build a Complete Website from Scratch — HTML, CSS & JS Tutorial",channel:"Ashish Varghese",views:"1.2M views",time:"2 weeks ago",duration:"42:18",thumb:"https://picsum.photos/seed/yt1/640/360",avatar:"https://i.pravatar.cc/36?img=11"},
  {title:"JavaScript Crash Course for Beginners 2026",channel:"Traversy Media",views:"856K views",time:"3 days ago",duration:"1:28:45",thumb:"https://picsum.photos/seed/yt2/640/360",avatar:"https://i.pravatar.cc/36?img=12"},
  {title:"CSS Grid & Flexbox — The Ultimate Guide",channel:"Kevin Powell",views:"423K views",time:"1 week ago",duration:"35:22",thumb:"https://picsum.photos/seed/yt3/640/360",avatar:"https://i.pravatar.cc/36?img=13"},
  {title:"React 19 New Features — Everything You Need to Know",channel:"Fireship",views:"2.1M views",time:"5 days ago",duration:"12:04",thumb:"https://picsum.photos/seed/yt4/640/360",avatar:"https://i.pravatar.cc/36?img=14"},
  {title:"Building a Full Stack App with Node.js and MongoDB",channel:"Net Ninja",views:"678K views",time:"1 month ago",duration:"58:33",thumb:"https://picsum.photos/seed/yt5/640/360",avatar:"https://i.pravatar.cc/36?img=15"},
  {title:"10 VS Code Extensions Every Developer Needs",channel:"Web Dev Simplified",views:"345K views",time:"4 days ago",duration:"15:47",thumb:"https://picsum.photos/seed/yt6/640/360",avatar:"https://i.pravatar.cc/36?img=16"},
  {title:"I Built a $10K Freelance Project in 48 Hours",channel:"Ashish Varghese",views:"2.8M views",time:"2 months ago",duration:"24:56",thumb:"https://picsum.photos/seed/yt7/640/360",avatar:"https://i.pravatar.cc/36?img=11"},
  {title:"Python vs JavaScript — Which Should You Learn?",channel:"Programming with Mosh",views:"1.5M views",time:"3 weeks ago",duration:"18:32",thumb:"https://picsum.photos/seed/yt8/640/360",avatar:"https://i.pravatar.cc/36?img=18"},
  {title:"How to Deploy Your Website for FREE in 2026",channel:"Fireship",views:"1.9M views",time:"1 week ago",duration:"8:15",thumb:"https://picsum.photos/seed/yt9/640/360",avatar:"https://i.pravatar.cc/36?img=14"},
  {title:"Tailwind CSS Full Course — Build 5 Projects",channel:"Traversy Media",views:"567K views",time:"2 weeks ago",duration:"2:15:30",thumb:"https://picsum.photos/seed/yt10/640/360",avatar:"https://i.pravatar.cc/36?img=12"},
  {title:"The BEST Way to Learn Web Development in 2026",channel:"Ashish Varghese",views:"945K views",time:"1 month ago",duration:"22:10",thumb:"https://picsum.photos/seed/yt11/640/360",avatar:"https://i.pravatar.cc/36?img=11"},
  {title:"Git & GitHub Tutorial for Beginners",channel:"Net Ninja",views:"1.1M views",time:"6 months ago",duration:"45:00",thumb:"https://picsum.photos/seed/yt12/640/360",avatar:"https://i.pravatar.cc/36?img=15"},
];
document.getElementById("videoGrid").innerHTML=videos.map(v=>`<div class="video-card"><div class="thumbnail-wrap"><img class="thumbnail" src="${v.thumb}" alt="${v.title}" loading="lazy"><span class="duration">${v.duration}</span></div><div class="video-info"><img class="channel-avatar" src="${v.avatar}" alt="${v.channel}"><div class="video-details"><div class="video-title">${v.title}</div><div class="channel-name">${v.channel}</div><div class="video-meta">${v.views} · ${v.time}</div></div></div></div>`).join("");
document.getElementById("searchInput").addEventListener("input",function(){const q=this.value.toLowerCase();document.querySelectorAll(".video-card").forEach((c,i)=>{c.style.display=videos[i].title.toLowerCase().includes(q)||videos[i].channel.toLowerCase().includes(q)?"":"none"})});
</script>
</body>
</html>
